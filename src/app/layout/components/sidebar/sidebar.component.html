<div class="sidebar">

  <div class="logo-section">

    <div class="logo-box">

      W

    </div>

    <h2>

      WorkSphere

    </h2>

  </div>

  <nav>

    <a
      routerLink="/"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{
        exact: true
      }">

      Dashboard

    </a>

    @if(
      currentRole() === 'admin'
    ) {

      <a
        routerLink="/users"
        routerLinkActive="active-link">

        Users

      </a>

    }

    <a
      routerLink="/chat"
      routerLinkActive="active-link">

      Chat

    </a>

    @if(
      currentRole() === 'admin'
    ) {

      <a
        routerLink="/settings"
        routerLinkActive="active-link">

        ⚙️ Settings

      </a>

    }

  </nav>

</div>
