<div class="header">

  <div>

    <h2>
      Welcome Back 👋
    </h2>

    <p>
      Manage your enterprise dashboard
    </p>

  </div>

  <div class="header-actions">

    <button
      class="theme-btn"
      (click)="toggleTheme()">

      @if(isDark()) {

        ☀️

      } @else {

        🌙

      }

    </button>

    <button
      class="logout-btn"
      (click)="logout()">

      Logout

    </button>

  </div>

</div>
