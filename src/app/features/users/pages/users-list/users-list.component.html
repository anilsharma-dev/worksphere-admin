<div class="page-wrapper">

  <div class="users-header">

    <div>

      <h1 class="page-title">
        Users
      </h1>

      <p class="subtitle">
        Manage team members and permissions
      </p>

    </div>

    <div class="header-actions">

      <button
        class="sort-btn"
        (click)="toggleSort()">

        Sort:
        {{ sortDirection() }}

      </button>

      <button
        class="export-btn"
        (click)="exportUsers()">

        Export CSV

      </button>

      <button
        class="btn-primary"
        (click)="openCreateDialog()">

        Add User

      </button>

    </div>

  </div>

  @if(error()) {

    <div class="error-banner">

      {{ error() }}

    </div>

  }

  <input
    class="app-input search-input"
    type="text"
    placeholder="Search users..."
    [formControl]="searchControl"
  />

  @if(loading()) {

    <app-loading-spinner>
    </app-loading-spinner>

  } @else {

    @if(filteredUsers().length > 0) {

      <app-user-table
        [users]="filteredUsers()"
        (edit)="openEditDialog($event)"
        (delete)="deleteUser($event)"
        (statusChange)="toggleStatus($event)"
        [loading]="loading()">
      </app-user-table>

    } @else {

      <div class="empty-state">

        <h3>
          No users found
        </h3>

        <p>
          Try searching with another keyword
        </p>

      </div>

    }

  }

</div>
