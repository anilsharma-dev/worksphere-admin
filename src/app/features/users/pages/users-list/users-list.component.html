<div class="page-wrapper">

  <h1 class="page-title">
    Users
  </h1>

  <div class="top-bar">

    <button
      class="add-btn"
      (click)="openCreateDialog()">

      Add User

    </button>

  </div>

  <input
    class="search-input"
    type="text"
    placeholder="Search users..."
    [formControl]="searchControl"
  />
    @if(isLoading()) {

      <app-loading-spinner>
      </app-loading-spinner>

    } @else {

      @if(filteredUsers.length > 0) {

      <app-user-table
        [users]="filteredUsers"
        (edit)="openEditDialog($event)"
        (delete)="deleteUser($event)">
      </app-user-table>

      } @else {

        <div class="empty-state">
          No users found
        </div>

      }

  }

</div>
