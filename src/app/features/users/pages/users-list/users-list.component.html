<div class="page-wrapper">

  <h1 class="page-title">
    Users
  </h1>

  <input
    class="search-input"
    type="text"
    placeholder="Search users..."
    [formControl]="searchControl"
  />
    @if(isLoading()) {

      <app-loading-spinner>
      </app-loading-spinner>

    } @else {

      @if(filteredUsers.length > 0) {

      <app-user-table
        [users]="filteredUsers">
      </app-user-table>

      } @else {

        <div class="empty-state">
          No users found
        </div>

      }

  }

</div>
