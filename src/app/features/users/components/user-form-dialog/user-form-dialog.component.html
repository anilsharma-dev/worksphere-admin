<h2 mat-dialog-title>
  User Form
</h2>

<div mat-dialog-content>

  <form [formGroup]="form">

    <input
      type="text"
      placeholder="Name"
      formControlName="name"
    />

    <input
      type="email"
      placeholder="Email"
      formControlName="email"
    />

    <input
      type="text"
      placeholder="Role"
      formControlName="role"
    />

  </form>

</div>

<div mat-dialog-actions>

  <button (click)="save()">
    Save
  </button>

</div>
