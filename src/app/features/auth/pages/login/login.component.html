<div class="login-page">

  <div class="login-card">

    <h1>
      WorkSphere Admin
    </h1>

    <p>
      Sign in to continue
    </p>

    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()">

      <div class="form-group">

        <label>
          Email
        </label>

        <input
          type="email"
          formControlName="email"
          placeholder="Enter email"
        />

      </div>

      <div class="form-group">

        <label>
          Password
        </label>

        <input
          type="password"
          formControlName="password"
          placeholder="Enter password"
        />

      </div>

      @if(errorMessage) {

        <div class="error-text">

          {{ errorMessage }}

        </div>

      }

      <button
        type="submit">

        Login

      </button>

    </form>

    <div class="demo-info">

      admin@gmail.com  
      /  
      admin123

    </div>

  </div>

</div>
