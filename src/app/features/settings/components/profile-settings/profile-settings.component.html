<div class="settings-card">

  <div class="profile-header">

  <div class="profile-avatar">

    @if(profileImage()) {

      <img
        [src]="profileImage()"
        alt="Profile">

    } @else {

      A

    }

  </div>

  <label class="upload-btn">

    Upload Photo

    <input
      type="file"
      accept="image/*"
      (change)="onFileSelected($event)"
      hidden>

  </label>

</div>

  <form
    [formGroup]="profileForm"
    (ngSubmit)="saveProfile()">

    <div class="form-group">

      <label>
        Name
      </label>

      <input
        type="text"
        formControlName="name">

    </div>

    <div class="form-group">

      <label>
        Email
      </label>

      <input
        type="email"
        formControlName="email">

    </div>

    <div class="form-group">

      <label>
        Bio
      </label>

      <textarea
        rows="4"
        formControlName="bio">
      </textarea>

    </div>

    <button type="submit">

      Save Profile

    </button>

  </form>

</div>
