<div class="settings-card">

  <div class="profile-header">

    <div class="profile-avatar">

      @if(profileImage()) {

        <img
          [src]="profileImage()"
          alt="Profile">

      } @else {

        A

      }

    </div>

    <div class="profile-info">

      <h2>

        {{ profileForm.value.name }}

      </h2>

      <p>

        Angular Developer

      </p>

      <label class="upload-btn">

        Upload Photo

        <input
          type="file"
          accept="image/*"
          hidden
          (change)="onFileSelected($event)">

      </label>

    </div>

  </div>

  <form
    [formGroup]="profileForm"
    (ngSubmit)="saveProfile()">

    <h3 class="section-title">

      Profile Information

    </h3>

    <div class="form-grid">

      <div class="form-group">

        <label>

          Name

        </label>

        <input
          type="text"
          formControlName="name">

      </div>

      <div class="form-group">

        <label>

          Email

        </label>

        <input
          type="email"
          formControlName="email">

      </div>

      <div
        class="form-group full-width">

        <label>

          Bio

        </label>

        <textarea
          rows="4"
          formControlName="bio">
        </textarea>

      </div>

    </div>

    <h3 class="section-title">

      Account Settings

    </h3>

    <div class="form-group">

      <label>

        Demo Role

      </label>

      <select
        [value]="currentRole()"
        (change)="changeRole($event)">

        <option value="admin">

          Admin

        </option>

        <option value="manager">

          Manager

        </option>

        <option value="user">

          User

        </option>

      </select>

    </div>

    <button
      class="save-btn"
      type="submit">

      Save Profile

    </button>

  </form>

</div>
