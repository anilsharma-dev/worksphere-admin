<h2 mat-dialog-title>

  {{ data.title }}

</h2>

<div mat-dialog-content>

  <p>

    {{ data.message }}

  </p>

</div>

<div
  mat-dialog-actions
  align="end">

  <button
    mat-button
    mat-dialog-close="false">

    {{ data.cancelText || 'Cancel' }}

  </button>

  <button
    mat-raised-button
    color="warn"
    [mat-dialog-close]="true">

    {{ data.confirmText || 'Delete' }}

  </button>

</div>
