<div class="notification-wrapper">

  <button
    class="notification-btn"
    (click)="toggleDropdown()">

    🔔

    @if(unreadCount() > 0) {

      <span class="badge">

        {{ unreadCount() }}

      </span>

    }

  </button>

  @if(isOpen()) {

    <div class="dropdown-panel">

      <h3>
        Notifications
      </h3>

      @for(
        item of notifications();
        track item.id
      ) {

        <div
          class="notification-item"
          [class.read]="item.read">

          <div>

            <h4>
              {{ item.title }}
            </h4>

            <p>
              {{ item.message }}
            </p>

            <small>
              {{ item.time }}
            </small>

          </div>

          @if(!item.read) {

            <button
              class="mark-btn"
              (click)="markAsRead(item.id)">

              Mark Read

            </button>

          }

        </div>

      }

    </div>

  }

</div>
